<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured Products · Order Now</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Card container — no longer a link */
        .popup-card {
            background: #ffffff;
            width: 100%;
            max-width: 440px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px 30px 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: inherit;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            /* not a link anymore */
            cursor: default;
        }

        /* subtle lift on hover (visual only) */
        .popup-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        .main-heading {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #000000;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .product-box {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            border: 1px solid #f1f1f1;
            width: 100%;
            padding: 16px;
            margin-bottom: 25px;
            text-align: left;
        }

        .single-image-container {
            width: 100%;
            background-color: #f9f9f9;
            padding: 10px;
            border-radius: 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .product-image {
            width: 100%;
            max-height: 220px;
            object-fit: contain;
            border-radius: 12px;
        }

        .product-title {
            font-size: 15px;
            font-weight: 600;
            color: #2c2c2c;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .rating-container {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 14px;
        }

        .rating-badge {
            background-color: #388e3c;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        .rating-count {
            font-size: 12px;
            color: #878787;
        }

        .price-container {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .current-price {
            font-size: 22px;
            font-weight: 700;
            color: #000000;
        }

        .original-price {
            font-size: 14px;
            color: #878787;
            text-decoration: line-through;
        }

        .discount {
            font-size: 14px;
            font-weight: 600;
            color: #388e3c;
        }

        /* ---------- ORDER NOW BUTTON (real link, only this redirects) ---------- */
        .order-now-btn {
            display: inline-block;
            background: #e31837;
            color: #fff !important;
            font-weight: 700;
            font-size: 20px;
            padding: 16px 32px;
            border-radius: 60px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 8px 18px rgba(227, 24, 55, 0.3);
            transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
            text-decoration: none;
            width: 100%;
            max-width: 280px;
            margin-top: 6px;
            margin-bottom: 16px;
            border: none;
            cursor: pointer;
            text-align: center;
            line-height: 1.2;
        }

        .order-now-btn:hover {
            background: #c41230;
            transform: scale(1.02);
            box-shadow: 0 10px 22px rgba(227, 24, 55, 0.4);
        }

        .order-now-btn:active {
            transform: scale(0.96);
        }

        .welcome-text {
            font-size: 15px;
            color: #666666;
            margin-bottom: 18px;
            font-weight: 400;
        }

        .secure-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px 10px;
            font-size: 14px;
            color: #555555;
            margin-top: 6px;
        }

        .trust-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            border-left: 1px solid #ddd;
            padding-left: 8px;
            margin-left: 4px;
        }

        .trust-badge .circle-check {
            width: 16px;
            height: 16px;
            background: #2f6df6;
            color: #fff;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        .trust-text {
            line-height: 1.2;
            text-align: left;
        }
        .trust-text b {
            color: #2954c8;
        }
        .trust-text small {
            color: #5f7fe5;
        }

        /* small fix for inline image */
        .secure-footer img {
            height: 16px;
            vertical-align: middle;
            display: inline-block;
        }
    </style>
</head>
<body>

    <!-- CARD: not clickable as a whole, only the button inside is a link -->
    <div class="popup-card">

        <h1 class="main-heading">Welcome</h1>

        <div class="product-box">
            <div class="single-image-container">
                <img class="product-image" src="https://m.media-amazon.com/images/I/512J1jN8WXL.jpg?w=100%" alt="Dry Fruits Mix">
            </div>

            <div class="product-title">
                (4KG - 1Kg*4) Dry Fruits Combo Pack of 4 - (Almonds, Cashews,...
            </div>

            <div class="rating-container">
                <span class="rating-badge">4.4 ★</span>
                <span class="rating-count">(4,320 Ratings)</span>
            </div>

            <div class="price-container">
                <span class="current-price">₹279</span>
                <span class="original-price">₹1999</span>
                <span class="discount">86% off</span>
            </div>
        </div>

        <!-- ORDER NOW BUTTON: only this element redirects to the website -->
        <a href="https://limited-offer.vercel.app" target="_blank" rel="noopener noreferrer" class="order-now-btn">
            🛒 Order Now
        </a>

        <p class="welcome-text">Welcome to our Dryfruit and Grocery Store</p>

        <div class="secure-footer">
            <span>🔒 Secure Payment by</span>
            <img src="https://razorpay.com/assets/razorpay-logo.svg" alt="Razorpay">

            <span class="trust-badge">
                <span class="circle-check">✓</span>
                <span class="trust-text">
                    <b>Trusted & Secure</b><br>
                    <small>100% Safe Payments</small>
                </span>
            </span>
        </div>
    </div>

</body>
</html>
