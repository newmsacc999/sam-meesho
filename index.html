    <style>
      /* ----- Reset & base (keep existing) ----- */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Inter', sans-serif;
        background: #f0f2f5;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      #root {
        width: 100%;
        max-width: 440px;
      }

      /* ----- POPUP CARD (injected via #root) ----- */
      .popup-card {
        background: #ffffff;
        width: 100%;
        border-radius: 40px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        padding: 40px 30px 30px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: inherit;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        cursor: default;
      }
      .popup-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
      }
      .main-heading {
        font-size: 36px;
        font-weight: 800;
        letter-spacing: 2px;
        color: #000000;
        margin-bottom: 25px;
        text-transform: uppercase;
        font-family: 'Poppins', sans-serif;
      }
      .product-box {
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        border: 1px solid #f1f1f1;
        width: 100%;
        padding: 16px;
        margin-bottom: 25px;
        text-align: left;
      }
      .single-image-container {
        width: 100%;
        background-color: #f9f9f9;
        padding: 10px;
        border-radius: 16px;
        margin-bottom: 16px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .product-image {
        width: 100%;
        max-height: 220px;
        object-fit: contain;
        border-radius: 12px;
      }
      .product-title {
        font-size: 15px;
        font-weight: 600;
        color: #2c2c2c;
        line-height: 1.4;
        margin-bottom: 8px;
        font-family: 'Poppins', sans-serif;
      }
      .rating-container {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 14px;
      }
      .rating-badge {
        background-color: #388e3c;
        color: white;
        font-size: 11px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        gap: 2px;
        font-family: 'Poppins', sans-serif;
      }
      .rating-count {
        font-size: 12px;
        color: #878787;
        font-family: 'Poppins', sans-serif;
      }
      .price-container {
        display: flex;
        align-items: baseline;
        gap: 8px;
        flex-wrap: wrap;
      }
      .current-price {
        font-size: 22px;
        font-weight: 700;
        color: #000000;
        font-family: 'Poppins', sans-serif;
      }
      .original-price {
        font-size: 14px;
        color: #878787;
        text-decoration: line-through;
        font-family: 'Poppins', sans-serif;
      }
      .discount {
        font-size: 14px;
        font-weight: 600;
        color: #388e3c;
        font-family: 'Poppins', sans-serif;
      }

      /* ORDER NOW BUTTON (only this redirects) */
      .order-now-btn {
        display: inline-block;
        background: #e31837;
        color: #fff !important;
        font-weight: 700;
        font-size: 20px;
        padding: 16px 32px;
        border-radius: 60px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        box-shadow: 0 8px 18px rgba(227, 24, 55, 0.3);
        transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
        text-decoration: none;
        width: 100%;
        max-width: 280px;
        margin-top: 6px;
        margin-bottom: 16px;
        border: none;
        cursor: pointer;
        text-align: center;
        line-height: 1.2;
        font-family: 'Poppins', sans-serif;
      }
      .order-now-btn:hover {
        background: #c41230;
        transform: scale(1.02);
        box-shadow: 0 10px 22px rgba(227, 24, 55, 0.4);
      }
      .order-now-btn:active {
        transform: scale(0.96);
      }

      .welcome-text {
        font-size: 15px;
        color: #666666;
        margin-bottom: 18px;
        font-weight: 400;
        font-family: 'Poppins', sans-serif;
      }

      .secure-footer {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 6px 10px;
        font-size: 14px;
        color: #555555;
        margin-top: 6px;
        font-family: 'Poppins', sans-serif;
      }
      .secure-footer img {
        height: 16px;
        vertical-align: middle;
        display: inline-block;
      }
      .trust-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 9px;
        border-left: 1px solid #ddd;
        padding-left: 8px;
        margin-left: 4px;
      }
      .trust-badge .circle-check {
        width: 16px;
        height: 16px;
        background: #2f6df6;
        color: #fff;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
      }
      .trust-text {
        line-height: 1.2;
        text-align: left;
      }
      .trust-text b {
        color: #2954c8;
      }
      .trust-text small {
        color: #5f7fe5;
      }

      /* preserve root spacing */
      #root {
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>

    <div id="root">
